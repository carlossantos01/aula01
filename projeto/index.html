<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Sou Nego - Cadastro de Elenco</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header-vitoria">
        <div class="logo-box">
           <img src="LOGO.png" alt="Logo Leão Vitória" id="logo-principal">
        </div>
        <h1>SOU NEGO</h1>
        <p class="subtitle">GESTÃO DINÂMICA DE ELENCO</p>
    </header>

    <main>
        <section class="secao-cadastro">
            <div class="card-formulario">
                <h2>CADASTRAR CRAQUE</h2>
                <form id="form-jogador">
                    <input type="text" id="nome" placeholder="NOME E FUNÇÃO" required>
                    
                    <div class="row">
                        <input type="text" id="origem" placeholder="ORIGEM" required>
                        <input type="text" id="atributo" placeholder="ATRIBUTO PRINCIPAL" required>
                    </div>

                    <textarea id="minibio" placeholder="MINIBIO (RESUMO DE 2 LINHAS)" rows="2" maxlength="150" required></textarea>
                    
                    <button type="submit" id="btn-salvar">SALVAR NO ELENCO</button>
                </form>
            </div>
        </section>

        <section class="secao-lista">
            <div class="divisor">
                <span>ELENCO ATUALIZADO</span>
            </div>
            <div id="grid-elenco" class="grid-elenco">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
