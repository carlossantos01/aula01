<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Kart 8 Deluxe - Boletim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div> <div class="container">
    <img src="mariokart8deluxe.webp" alt="Logo Mario Kart" class="header-img">
    <h1>🏆 Race Results</h1>
    
    <div class="input-group">
        <label>Nota 1ª Volta:</label>
        <input type="number" id="n1" min="0" max="10" step="0.1" placeholder="0.0">
    </div>

    <div class="input-group">
        <label>Nota 2ª Volta:</label>
        <input type="number" id="n2" min="0" max="10" step="0.1" placeholder="0.0">
    </div>

    <div class="input-group">
        <label>Nota 3ª Volta:</label>
        <input type="number" id="n3" min="0" max="10" step="0.1" placeholder="0.0">
    </div>

    <button onclick="calcularMedia()">Cruzar a Chegada!</button>

    <div id="resultado"></div>
</div>

<script src="script.js"></script>
</body>
</html>
