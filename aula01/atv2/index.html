<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God of War - Calculadora Épica</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Spectral:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="overlay"></div>

    <main class="container">
        <header class="main-header">
            <img src="images.jpg" alt="God of War Ascension" class="logo-topo">
        </header>

        <section class="calc-box">
            <div class="second-logo-container">
            
            </div>

            <div class="input-group">
                <input type="number" id="num1" placeholder="Valor I">
                <input type="number" id="num2" placeholder="Valor II">
            </div>

            <button onclick="calcular()">Desvendar Poder</button>

            <div id="resultado" class="res-area">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
